{% extends 'base.html' %}

{% block title %}Supprimer {{ user.username }} - TicketManager{% endblock %}

{% block content %}
    <h1>Supprimer l'utilisateur</h1>

    <div class="card" style="border-top: 4px solid #721c24;">
        <p>Êtes-vous sûr de vouloir supprimer l'utilisateur <strong>"{{ user.username }}"</strong> ?</p>
        <p style="color: #666; font-size: 0.9em;">Cette action est irréversible.</p>

        <form method="post" style="margin-top: 25px;">
            {% csrf_token %}
            <button type="submit" class="btn" style="background: #721c24;">Confirmer la suppression</button>
            <a href="{% url 'frontend-user-list' %}" style="margin-left: 15px; color: #666;">Annuler</a>
        </form>
    </div>
{% endblock %}
