{% extends 'base.html' %}

{% block title %}Connexion - TicketManager{% endblock %}

{% block content %}
    <div class="card" style="max-width: 400px; margin: 60px auto;">
        <h1 style="margin-top: 0;">Connexion</h1>
        <p style="color: #666;">Connectez-vous pour accéder à votre espace.</p>

        <form method="post" style="margin-top: 20px;">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Nom d'utilisateur</label>
                <input type="text" name="username" class="input-field" autofocus required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">Mot de passe</label>
                <input type="password" name="password" class="input-field" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 10px;">Se connecter</button>
        </form>
    </div>
{% endblock %}
